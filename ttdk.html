<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin dăng ký</title>
</head>
<body>
    <div class="container" style="margin-top: 30px;">
    <div class="row">
            <div class="panel panel-default">
                <div class="panel-body" style="padding: 40px;">       
                    <table width="60%" height="60%" align="center" cellpadding="10" cellspacing="0"  style="border-radius: 20px; overflow: hidden; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">

    <tr>
        <td colspan="2" style="background-color: #679e28e9; color: black;  text-align: center; font-weight: bold; font-size: 18px;"><h1>THÔNG TIN ĐĂNG KÝ</h1></td>
    </tr>
    <tr>
        <td width="150"><b>Họ tên:</b></td>
        <td><input type="text" placeholder="Nhập họ tên" style="width: 100%; border: none; border-bottom: 1px solid #333; outline: none; padding: 5px 0;"></td>
    </tr>
    <tr>
        <td><b>Ngày sinh:</b></td>
        <td><input type="date" placeholder="Nhập ngày sinh" style="width: 100%; border: none; border-bottom: 1px solid #333; outline: none; padding: 5px 0;"></td>
    </tr>
    <tr>
        <td><b>Giới tính:</b></td>
        <td>
            <input type="radio" name="gt"> Nam
            <input type="radio" name="gt"> Nữ
            <input type="radio" name="gt"> không muốn nói
        </td>
    </tr>
    <tr>
        <td><b>Địa chỉ:</b></td>
        <td><input type="text" placeholder="Nhập địa chỉ"  size="100%" style="width: 100%; border: none; border-bottom: 1px solid #333; outline: none; padding: 5px 0;"></td>
    </tr>

    <tr>
        <td><b>MSSV:</b></td>
        <td><input type="text" size="100%" placeholder="Nhập MSSV" style="width: 100%; border: none; border-bottom: 1px solid #333; outline: none; padding: 5px 0;"></td>
    </tr>

    <tr>
    <td width="150"><label for="lop"><b>Lớp:</b></label></td>
    <td >
        <select id="lop" name="lop" style="width: 100%; border: none; border-bottom: 1px solid #333; outline: none; padding: 5px 0;">
            <option value="" disabled selected>Chọn lớp</option>
            <option value="DA25TTA">DA25TTA</option>
            <option value="DA25TTB">DA25TTB</option>
            <option value="DA25TTC">DA25TTC</option>
            <option value="DA25TTD">DA25TTD</option>
            <option value="DA25TT-ELIP">DA25TT-ELIP</option>
        </select>
    </td>
</tr>

    <tr>
        <td><b>Số điện thoại:</b></td>
        <td><input type="text" placeholder="Nhập số điện thoại" style="width: 100%; border: none; border-bottom: 1px solid #333; outline: none; padding: 5px 0;"></td>
    </tr>
    <tr>
        <td><b>Email:</b></td>
        <td><input type="email" size="100%" placeholder="Nhập email" style="width: 100%; border: none; border-bottom: 1px solid #333; outline: none; padding: 5px 0;"></td>
    </tr>
 


    <tr>
        <td><b>Ảnh đại diện:</b></td>
        <td><input type="file"></td>
    </tr>
    <tr>
        <td><b>Sở trường:</b></td>
        <td>
            <input type="checkbox"> Thiết kế web
            <input type="checkbox"> Lập trình web
            <input type="checkbox"> Thành thào tiếng Trung
            <input type="checkbox"> Khác
           
        </td>
    </tr>
    <tr>
        <td><b>Mô tả sơ lược:</b></td>
        <td>
            <textarea rows="4" cols="40" style="width: 80%;" placeholder="Nhập mô tả sơ lược"></textarea>
        </td>
    </tr>
    <tr>
        <td colspan="2" align="center" bgcolor="#f9f9f9">
            <input type="button" value="Hủy bỏ" style="background-color: #679e28e9; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
            <input type="submit" value="Đăng ký"style="background-color:  #679e28e9; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
        </td>
    </tr>
</table>

                </div>
            </div>
    </div>
</div>
<a href="index.html" style="display: block; text-align: center; font-weight: bold;">Quay lại trang chủ</a>  
</body>
</html>
